# Builds and pushes per-site container images to GHCR.
# Deployment is handled by ArgoCD Image Updater in ozea-gitops:
# it watches ghcr.io/moacirjun/ozea-sites/<site>, picks up new SHA-tagged
# images (newest-build strategy), and bumps the tag in apps/<site>/kustomization.yaml
# via an automated git commit. ArgoCD then rolls out the new pod.
name: Build and Push Site

on:
  push:
    branches: [main]
    paths:
      - "sites/**"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.changes.outputs.sites }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^sites/' | cut -d/ -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "sites=$CHANGED" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.sites != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        site: ${{ fromJson(needs.detect-changes.outputs.sites) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: sites/${{ matrix.site }}
          push: true
          # Image Updater picks up the 40-char SHA tag; :latest is kept for
          # manual docker pulls and ad-hoc debugging.
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.site }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.site }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.site }}
          cache-to: type=gha,mode=max,scope=${{ matrix.site }}
